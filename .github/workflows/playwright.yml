name: Playwright Tests with Demo Application

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

env:
  DOCKER_IMAGE: pw-demo-tests
  DOCKER_TAG: ${{ github.sha }}

jobs:
  test:
    name: Run Tests - ${{ matrix.browser }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        
    steps:
    - name: Checkout test framework repository
      uses: actions/checkout@v4

    - name: Clone demo application
      run: |
        git clone https://github.com/Animesh66/demo-front-end.git demo-app
        cp Dockerfile.backend demo-app/Dockerfile.backend
        cp Dockerfile.frontend demo-app/Dockerfile.frontend

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Start MongoDB, Backend, and Frontend services
      run: |
        docker compose up -d mongodb backend frontend
        echo "⏳ Waiting for services to be healthy..."
        sleep 45

    - name: Verify services are running
      run: |
        echo "🔍 Checking MongoDB..."
        docker compose ps mongodb
        echo ""
        echo "🔍 Checking Backend..."
        docker compose ps backend
        curl -f http://localhost:3000/api/products || exit 1
        echo ""
        echo "🔍 Checking Frontend..."
        docker compose ps frontend
        curl -f http://localhost:5173 || exit 1
        echo ""
        echo "✅ All services are healthy"

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}

    - name: Run Playwright tests
      run: npx playwright test --project=${{ matrix.browser }}
      env:
        BASE_URL: http://localhost:5173
        CI: true

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ matrix.browser }}
        path: playwright-report/
        retention-days: 30

    - name: Upload test artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.browser }}
        path: test-results/
        retention-days: 30

    - name: Upload allure results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results-${{ matrix.browser }}
        path: allure-results/
        retention-days: 30

    - name: Upload logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: logs-${{ matrix.browser }}
        path: logs/
        retention-days: 30

    - name: Show service logs on failure
      if: failure()
      run: |
        echo "📋 MongoDB logs:"
        docker compose logs mongodb
        echo ""
        echo "📋 Backend logs:"
        docker compose logs backend
        echo ""
        echo "📋 Frontend logs:"
        docker compose logs frontend

    - name: Cleanup
      if: always()
      run: docker compose down -v

  test-docker:
    name: Run Tests in Docker - Full Stack
    timeout-minutes: 60
    runs-on: ubuntu-latest
        
    steps:
    - name: Checkout test framework repository
      uses: actions/checkout@v4

    - name: Clone demo application
      run: |
        git clone https://github.com/Animesh66/demo-front-end.git demo-app
        cp Dockerfile.backend demo-app/Dockerfile.backend
        cp Dockerfile.frontend demo-app/Dockerfile.frontend

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build all Docker images
      run: docker compose build

    - name: Run all tests with Docker Compose
      run: |
        docker compose up --abort-on-container-exit --exit-code-from playwright-tests
      
    - name: Copy test results from container
      if: always()
      run: |
        # Test results are already mounted to host via volumes
        ls -la test-results/ || true
        ls -la playwright-report/ || true

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-docker
        path: playwright-report/
        retention-days: 30

    - name: Upload logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: logs-docker
        path: logs/
        retention-days: 30

    - name: Show service logs on failure
      if: failure()
      run: docker compose logs

    - name: Cleanup
      if: always()
      run: docker compose down -v

  report:
    name: Publish Test Report
    needs: [test, test-docker]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
      checks: write
      pull-requests: write
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v4
      if: always()
      with:
        report_paths: '**/test-results/**/junit.xml'
        check_name: Test Report
        detailed_summary: true
        include_passed: true
