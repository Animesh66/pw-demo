name: Playwright Tests with Demo Application

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

env:
  BASE_URL: http://localhost:5173

jobs:
  setup-services:
    name: Setup and Verify Services
    timeout-minutes: 30
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout test framework repository
      uses: actions/checkout@v4

    - name: Clone demo application
      run: |
        git clone https://github.com/Animesh66/demo-front-end.git demo-app
        cp Dockerfile.backend demo-app/Dockerfile.backend
        cp Dockerfile.frontend demo-app/Dockerfile.frontend

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker images
      run: |
        echo "🔨 Building Docker images..."
        docker compose build mongodb backend frontend
        echo "✅ Docker images built successfully"

    - name: Start all services
      run: |
        echo "🚀 Starting services..."
        docker compose up -d mongodb backend frontend
        echo "✅ Services started"

    - name: Wait for MongoDB to be healthy
      run: |
        echo "⏳ Waiting for MongoDB..."
        for i in {1..30}; do
          if docker compose ps mongodb | grep -q "healthy"; then
            echo "✅ MongoDB is healthy"
            break
          fi
          echo "  Attempt $i/30..."
          sleep 2
        done

    - name: Wait for Backend API to be ready
      run: |
        echo "⏳ Waiting for Backend API..."
        for i in {1..40}; do
          if curl -sf http://localhost:3000/api/products > /dev/null 2>&1; then
            echo "✅ Backend API is responding"
            break
          fi
          echo "  Attempt $i/40..."
          sleep 3
        done

    - name: Wait for Frontend to be ready
      run: |
        echo "⏳ Waiting for Frontend..."
        for i in {1..40}; do
          if curl -sf http://localhost:5173 > /dev/null 2>&1; then
            echo "✅ Frontend is responding"
            break
          fi
          echo "  Attempt $i/40..."
          sleep 3
        done

    - name: Final stabilization wait
      run: |
        echo "⏳ Waiting for full system stabilization..."
        sleep 10
        echo "✅ System is stable"

    - name: Verify all services are healthy
      run: |
        echo "🔍 Final verification of all services..."
        echo ""
        echo "MongoDB:"
        docker compose ps mongodb
        echo ""
        echo "Backend:"
        docker compose ps backend
        curl -f http://localhost:3000/api/products || exit 1
        echo ""
        echo "Frontend:"
        docker compose ps frontend
        curl -f http://localhost:5173 || exit 1
        echo ""
        echo "✅ All services verified and healthy"

    - name: Show service logs
      if: always()
      run: |
        echo "📋 Service logs for debugging:"
        echo ""
        echo "=== MongoDB Logs ==="
        docker compose logs --tail=50 mongodb
        echo ""
        echo "=== Backend Logs ==="
        docker compose logs --tail=50 backend
        echo ""
        echo "=== Frontend Logs ==="
        docker compose logs --tail=50 frontend

    - name: Cleanup services
      if: always()
      run: |
        echo "🧹 Cleaning up services..."
        docker compose down -v
        echo "✅ Cleanup complete"

  test-order:
    name: Order Tests - ${{ matrix.browser }}
    needs: [setup-services]
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        
    steps:
    - name: Checkout test framework repository
      uses: actions/checkout@v4

    - name: Clone demo application
      run: |
        git clone https://github.com/Animesh66/demo-front-end.git demo-app
        cp Dockerfile.backend demo-app/Dockerfile.backend
        cp Dockerfile.frontend demo-app/Dockerfile.frontend

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker images
      run: docker compose build mongodb backend frontend

    - name: Start services
      run: docker compose up -d mongodb backend frontend

    - name: Wait for services to be ready
      run: |
        echo "⏳ Waiting for services (validated in setup job)..."
        for i in {1..20}; do
          MONGO_OK=$(docker compose ps mongodb | grep -q "healthy" && echo "yes" || echo "no")
          BACKEND_OK=$(curl -sf http://localhost:3000/api/products > /dev/null 2>&1 && echo "yes" || echo "no")
          FRONTEND_OK=$(curl -sf http://localhost:5173 > /dev/null 2>&1 && echo "yes" || echo "no")
          
          if [ "$MONGO_OK" = "yes" ] && [ "$BACKEND_OK" = "yes" ] && [ "$FRONTEND_OK" = "yes" ]; then
            echo "✅ All services are ready"
            break
          fi
          echo "  Attempt $i/20 - MongoDB: $MONGO_OK, Backend: $BACKEND_OK, Frontend: $FRONTEND_OK"
          sleep 5
        done
        sleep 5

    - name: Verify services
      run: |
        docker compose ps
        curl -f http://localhost:3000/api/products || exit 1
        curl -f http://localhost:5173 || exit 1
        echo "✅ Services verified"

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}

    - name: Run Order Tests
      run: npx playwright test --project=${{ matrix.browser }} --grep="@order"
      env:
        BASE_URL: http://localhost:5173
        CI: true

    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-order-${{ matrix.browser }}
        path: playwright-report/
        retention-days: 30

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-order-${{ matrix.browser }}
        path: test-results/
        retention-days: 30

    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results-order-${{ matrix.browser }}
        path: allure-results/
        retention-days: 30

    - name: Upload Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: logs-order-${{ matrix.browser }}
        path: logs/
        retention-days: 30

    - name: Show service logs on failure
      if: failure()
      run: |
        echo "📋 MongoDB logs:"
        docker compose logs mongodb
        echo ""
        echo "📋 Backend logs:"
        docker compose logs backend
        echo ""
        echo "📋 Frontend logs:"
        docker compose logs frontend

    - name: Cleanup services
      if: always()
      run: docker compose down -v

  test-registration:
    name: Registration Tests - ${{ matrix.browser }}
    needs: [setup-services]
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        
    steps:
    - name: Checkout test framework repository
      uses: actions/checkout@v4

    - name: Clone demo application
      run: |
        git clone https://github.com/Animesh66/demo-front-end.git demo-app
        cp Dockerfile.backend demo-app/Dockerfile.backend
        cp Dockerfile.frontend demo-app/Dockerfile.frontend

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker images
      run: docker compose build mongodb backend frontend

    - name: Start services
      run: docker compose up -d mongodb backend frontend

    - name: Wait for services to be ready
      run: |
        echo "⏳ Waiting for services (validated in setup job)..."
        for i in {1..20}; do
          MONGO_OK=$(docker compose ps mongodb | grep -q "healthy" && echo "yes" || echo "no")
          BACKEND_OK=$(curl -sf http://localhost:3000/api/products > /dev/null 2>&1 && echo "yes" || echo "no")
          FRONTEND_OK=$(curl -sf http://localhost:5173 > /dev/null 2>&1 && echo "yes" || echo "no")
          
          if [ "$MONGO_OK" = "yes" ] && [ "$BACKEND_OK" = "yes" ] && [ "$FRONTEND_OK" = "yes" ]; then
            echo "✅ All services are ready"
            break
          fi
          echo "  Attempt $i/20 - MongoDB: $MONGO_OK, Backend: $BACKEND_OK, Frontend: $FRONTEND_OK"
          sleep 5
        done
        sleep 5

    - name: Verify services
      run: |
        docker compose ps
        curl -f http://localhost:3000/api/products || exit 1
        curl -f http://localhost:5173 || exit 1
        echo "✅ Services verified"

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}

    - name: Run Registration Tests
      run: npx playwright test --project=${{ matrix.browser }} --grep="@registration"
      env:
        BASE_URL: http://localhost:5173
        CI: true

    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-registration-${{ matrix.browser }}
        path: playwright-report/
        retention-days: 30

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-registration-${{ matrix.browser }}
        path: test-results/
        retention-days: 30

    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results-registration-${{ matrix.browser }}
        path: allure-results/
        retention-days: 30

    - name: Upload Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: logs-registration-${{ matrix.browser }}
        path: logs/
        retention-days: 30

    - name: Show service logs on failure
      if: failure()
      run: |
        echo "📋 MongoDB logs:"
        docker compose logs mongodb
        echo ""
        echo "📋 Backend logs:"
        docker compose logs backend
        echo ""
        echo "📋 Frontend logs:"
        docker compose logs frontend

    - name: Cleanup services
      if: always()
      run: docker compose down -v

  report:
    name: Publish Test Report
    needs: [test-order, test-registration]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
      checks: write
      pull-requests: write
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v4
      if: always()
      with:
        report_paths: '**/test-results/**/junit.xml'
        check_name: Test Report
        detailed_summary: true
        include_passed: true
