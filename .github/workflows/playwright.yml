name: Playwright Tests with Demo Application

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

env:
  BASE_URL: http://localhost:5173

jobs:
  test-order:
    name: Order Tests - ${{ matrix.browser }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        
    steps:
    - name: Checkout test framework repository
      uses: actions/checkout@v4

    - name: Clone demo application
      run: |
        git clone https://github.com/Animesh66/demo-front-end.git demo-app
        cp Dockerfile.backend demo-app/Dockerfile.backend
        cp Dockerfile.frontend demo-app/Dockerfile.frontend

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker images
      run: docker compose build mongodb backend frontend

    - name: Start MongoDB, Backend, and Frontend services
      run: docker compose up -d mongodb backend frontend
        
    - name: Wait for services to be ready
      run: |
        echo "⏳ Waiting for services to be healthy..."
        echo "Waiting for MongoDB..."
        timeout 60 bash -c 'until docker compose ps mongodb | grep -q "healthy"; do sleep 2; done' || true
        
        echo "Waiting for Backend..."
        timeout 120 bash -c 'until curl -sf http://localhost:3000/api/products > /dev/null; do sleep 3; done' || true
        
        echo "Waiting for Frontend..."
        timeout 120 bash -c 'until curl -sf http://localhost:5173 > /dev/null; do sleep 3; done' || true
        
        sleep 10

    - name: Verify services are running
      run: |
        echo "🔍 Checking MongoDB..."
        docker compose ps mongodb
        echo ""
        echo "🔍 Checking Backend..."
        docker compose ps backend
        curl -f http://localhost:3000/api/products || exit 1
        echo ""
        echo "🔍 Checking Frontend..."
        docker compose ps frontend
        curl -f http://localhost:5173 || exit 1
        echo ""
        echo "✅ All services are healthy"

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}

    - name: Run Order Tests
      run: npx playwright test --project=${{ matrix.browser }} --grep="@order"
      env:
        BASE_URL: http://localhost:5173
        CI: true

    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-order-${{ matrix.browser }}
        path: playwright-report/
        retention-days: 30

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-order-${{ matrix.browser }}
        path: test-results/
        retention-days: 30

    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results-order-${{ matrix.browser }}
        path: allure-results/
        retention-days: 30

    - name: Upload Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: logs-order-${{ matrix.browser }}
        path: logs/
        retention-days: 30

    - name: Show service logs on failure
      if: failure()
      run: |
        echo "📋 MongoDB logs:"
        docker compose logs mongodb
        echo ""
        echo "📋 Backend logs:"
        docker compose logs backend
        echo ""
        echo "📋 Frontend logs:"
        docker compose logs frontend

    - name: Cleanup services
      if: always()
      run: docker compose down -v

  test-registration:
    name: Registration Tests - ${{ matrix.browser }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        
    steps:
    - name: Checkout test framework repository
      uses: actions/checkout@v4

    - name: Clone demo application
      run: |
        git clone https://github.com/Animesh66/demo-front-end.git demo-app
        cp Dockerfile.backend demo-app/Dockerfile.backend
        cp Dockerfile.frontend demo-app/Dockerfile.frontend

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker images
      run: docker compose build mongodb backend frontend

    - name: Start MongoDB, Backend, and Frontend services
      run: docker compose up -d mongodb backend frontend
        
    - name: Wait for services to be ready
      run: |
        echo "⏳ Waiting for services to be healthy..."
        echo "Waiting for MongoDB..."
        timeout 60 bash -c 'until docker compose ps mongodb | grep -q "healthy"; do sleep 2; done' || true
        
        echo "Waiting for Backend..."
        timeout 120 bash -c 'until curl -sf http://localhost:3000/api/products > /dev/null; do sleep 3; done' || true
        
        echo "Waiting for Frontend..."
        timeout 120 bash -c 'until curl -sf http://localhost:5173 > /dev/null; do sleep 3; done' || true
        
        sleep 10

    - name: Verify services are running
      run: |
        echo "🔍 Checking MongoDB..."
        docker compose ps mongodb
        echo ""
        echo "🔍 Checking Backend..."
        docker compose ps backend
        curl -f http://localhost:3000/api/products || exit 1
        echo ""
        echo "🔍 Checking Frontend..."
        docker compose ps frontend
        curl -f http://localhost:5173 || exit 1
        echo ""
        echo "✅ All services are healthy"

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}

    - name: Run Registration Tests
      run: npx playwright test --project=${{ matrix.browser }} --grep="@registration"
      env:
        BASE_URL: http://localhost:5173
        CI: true

    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-registration-${{ matrix.browser }}
        path: playwright-report/
        retention-days: 30

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-registration-${{ matrix.browser }}
        path: test-results/
        retention-days: 30

    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results-registration-${{ matrix.browser }}
        path: allure-results/
        retention-days: 30

    - name: Upload Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: logs-registration-${{ matrix.browser }}
        path: logs/
        retention-days: 30

    - name: Show service logs on failure
      if: failure()
      run: |
        echo "📋 MongoDB logs:"
        docker compose logs mongodb
        echo ""
        echo "📋 Backend logs:"
        docker compose logs backend
        echo ""
        echo "📋 Frontend logs:"
        docker compose logs frontend

    - name: Cleanup services
      if: always()
      run: docker compose down -v

  report:
    name: Publish Test Report
    needs: [test-order, test-registration]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
      checks: write
      pull-requests: write
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v4
      if: always()
      with:
        report_paths: '**/test-results/**/junit.xml'
        check_name: Test Report
        detailed_summary: true
        include_passed: true
