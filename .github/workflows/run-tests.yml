name: Run Playwright Tests

on:
  workflow_call:
    inputs:
      test-suite:
        description: 'Test suite to run (order or registration)'
        required: true
        type: string
      browser-matrix:
        description: 'Browser matrix as JSON array'
        required: false
        type: string
        default: '["chromium", "firefox", "webkit"]'

jobs:
  test:
    name: ${{ inputs.test-suite }} Tests - ${{ matrix.browser }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ fromJson(inputs.browser-matrix) }}
        
    steps:
    - name: Checkout test framework repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Clone and setup demo application
      run: |
        echo "📦 Cloning demo application..."
        git clone https://github.com/Animesh66/demo-front-end.git demo-app
        
        echo "📦 Installing backend dependencies..."
        cd demo-app/server && npm install && cd ../..
        
        echo "📦 Installing frontend dependencies..."
        cd demo-app/client && npm install && cd ../..
        
        echo "✅ Demo application ready"

    - name: Start services and run tests in single process group
      run: |
        # Start backend in background
        cd demo-app/server
        PORT=3000 MONGODB_URI=mongodb://localhost:27017/demo-app NODE_ENV=development JWT_SECRET=test-secret npm start >../../backend.log 2>&1 &
        BACKEND_PID=$!
        cd ../..
        echo "Backend started with PID: $BACKEND_PID"
        
        # Start frontend in background
        cd demo-app/client
        VITE_API_URL=http://localhost:3000 npm run dev -- --host 0.0.0.0 --port 5173 >../../frontend.log 2>&1 &
        FRONTEND_PID=$!
        cd ../..
        echo "Frontend started with PID: $FRONTEND_PID"
        
        # Wait for backend
        echo "⏳ Waiting for backend API..."
        for i in {1..60}; do
          if curl -sf http://localhost:3000/api/products > /dev/null 2>&1; then
            echo "✅ Backend API responding"
            break
          fi
          if [ $i -eq 60 ]; then
            echo "❌ Backend failed to respond"
            cat backend.log
            kill $BACKEND_PID $FRONTEND_PID 2>/dev/null || true
            exit 1
          fi
          sleep 2
        done
        
        # Wait for frontend
        echo "⏳ Waiting for frontend..."
        for i in {1..60}; do
          if curl -sf http://localhost:5173 > /dev/null 2>&1; then
            echo "✅ Frontend responding"
            break
          fi
          if [ $i -eq 60 ]; then
            echo "❌ Frontend failed to respond"
            cat frontend.log
            kill $BACKEND_PID $FRONTEND_PID 2>/dev/null || true
            exit 1
          fi
          sleep 2
        done
        
        echo "✅ All services ready"
        
        # Install test dependencies and run tests in same process group
        npm ci
        npx playwright install --with-deps ${{ matrix.browser }}
        
        # Run tests
        npx playwright test --project=${{ matrix.browser }} --grep="@${{ inputs.test-suite }}" || TEST_EXIT=$?
        
        # Cleanup services
        echo "🧹 Stopping services..."
        kill $BACKEND_PID $FRONTEND_PID 2>/dev/null || true
        
        # Exit with test result
        exit ${TEST_EXIT:-0}
      env:
        BASE_URL: http://localhost:5173
        CI: true

    - name: Install test dependencies
      run: npm ci


    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ inputs.test-suite }}-${{ matrix.browser }}
        path: playwright-report/
        retention-days: 30

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ inputs.test-suite }}-${{ matrix.browser }}
        path: test-results/
        retention-days: 30

    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results-${{ inputs.test-suite }}-${{ matrix.browser }}
        path: allure-results/
        retention-days: 30

    - name: Upload Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: logs-${{ inputs.test-suite }}-${{ matrix.browser }}
        path: |
          backend.log
          frontend.log
          logs/
        retention-days: 30


