name: Run Playwright Tests

on:
  workflow_call:
    inputs:
      test-suite:
        description: 'Test suite to run (order or registration)'
        required: true
        type: string
      browser-matrix:
        description: 'Browser matrix as JSON array'
        required: false
        type: string
        default: '["chromium", "firefox", "webkit"]'

jobs:
  test:
    name: ${{ inputs.test-suite }} Tests - ${{ matrix.browser }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ fromJson(inputs.browser-matrix) }}
        
    steps:
    - name: Checkout test framework repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Clone and start demo application
      run: |
        git clone https://github.com/Animesh66/demo-front-end.git demo-app
        
        # Get absolute path
        WORK_DIR=$(pwd)
        echo "Working directory: ${WORK_DIR}"
        
        # Install and start backend
        echo "📦 Installing backend dependencies..."
        cd demo-app/server
        npm install
        
        echo "🚀 Starting backend server..."
        nohup npm start > "${WORK_DIR}/backend.log" 2>&1 &
        BACKEND_PID=$!
        echo $BACKEND_PID > "${WORK_DIR}/backend.pid"
        echo "Backend started with PID: $BACKEND_PID"
        sleep 2
        
        # Verify backend process
        if ps -p $BACKEND_PID > /dev/null; then
          echo "✅ Backend process $BACKEND_PID is running"
        else
          echo "❌ Backend process $BACKEND_PID died immediately"
          cat "${WORK_DIR}/backend.log"
          exit 1
        fi
        
        cd "${WORK_DIR}"
        
        # Install and start frontend
        echo "📦 Installing frontend dependencies..."
        cd demo-app/client
        npm install
        
        echo "🚀 Starting frontend server..."
        nohup npm run dev -- --host 0.0.0.0 --port 5173 > "${WORK_DIR}/frontend.log" 2>&1 &
        FRONTEND_PID=$!
        echo $FRONTEND_PID > "${WORK_DIR}/frontend.pid"
        echo "Frontend started with PID: $FRONTEND_PID"
        sleep 2
        
        # Verify frontend process
        if ps -p $FRONTEND_PID > /dev/null; then
          echo "✅ Frontend process $FRONTEND_PID is running"
        else
          echo "❌ Frontend process $FRONTEND_PID died immediately"
          cat "${WORK_DIR}/frontend.log"
          exit 1
        fi
        
        cd "${WORK_DIR}"
        
        echo "✅ Both services started successfully"
        echo "Backend PID: $(cat backend.pid)"
        echo "Frontend PID: $(cat frontend.pid)"
      env:
        PORT: 3000
        MONGODB_URI: mongodb://localhost:27017/demo-app
        NODE_ENV: development
        JWT_SECRET: test-secret
        VITE_API_URL: http://localhost:3000

    - name: Wait for services
      run: |
        echo "⏳ Waiting for Backend..."
        for i in {1..40}; do
          if curl -sf http://localhost:3000/api/products > /dev/null 2>&1; then
            echo "✅ Backend ready"
            break
          fi
          echo "  Attempt $i/40..."
          sleep 3
        done
        
        echo "⏳ Waiting for Frontend..."
        for i in {1..40}; do
          if curl -sf http://localhost:5173 > /dev/null 2>&1; then
            echo "✅ Frontend ready"
            break
          fi
          echo "  Attempt $i/40..."
          sleep 3
        done
        
        # Verify login page is accessible (important for auth setup)
        echo "⏳ Verifying login page..."
        for i in {1..20}; do
          if curl -sf http://localhost:5173/login > /dev/null 2>&1; then
            echo "✅ Login page accessible"
            break
          fi
          echo "  Attempt $i/20..."
          sleep 2
        done
        
        # Give services extra time to stabilize
        echo "⏳ Allowing services to stabilize..."
        sleep 10
        
        echo "✅ All services ready for testing"

    - name: Install test dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}

    - name: Verify services before test execution
      run: |
        echo "🔍 Verifying services are still running..."
        
        BACKEND_PID=$(cat backend.pid)
        FRONTEND_PID=$(cat frontend.pid)
        
        echo "Checking backend PID: $BACKEND_PID"
        if ps -p $BACKEND_PID > /dev/null; then
          echo "✅ Backend process $BACKEND_PID is running"
        else
          echo "❌ Backend process $BACKEND_PID died!"
          echo "Last 50 lines of backend logs:"
          tail -50 backend.log
          exit 1
        fi
        
        echo "Checking frontend PID: $FRONTEND_PID"
        if ps -p $FRONTEND_PID > /dev/null; then
          echo "✅ Frontend process $FRONTEND_PID is running"
        else
          echo "❌ Frontend process $FRONTEND_PID died!"
          echo "Last 50 lines of frontend logs:"
          tail -50 frontend.log
          exit 1
        fi
        
        echo "✅ Both services confirmed running"
        
        # Final health check
        echo "🔍 Final health check..."
        if curl -f http://localhost:3000/api/products > /dev/null 2>&1; then
          echo "✅ Backend API responding"
        else
          echo "❌ Backend not responding"
          tail -30 backend.log
          exit 1
        fi
        
        if curl -f http://localhost:5173 > /dev/null 2>&1; then
          echo "✅ Frontend responding"
        else
          echo "❌ Frontend not responding"
          tail -30 frontend.log
          exit 1
        fi
        
        echo "✅ All pre-test verifications passed"

    - name: Run ${{ inputs.test-suite }} Tests
      run: |
        echo "🧪 Running tests with configuration:"
        echo "  BASE_URL: http://localhost:5173"
        echo "  Browser: ${{ matrix.browser }}"
        echo "  Test suite: @${{ inputs.test-suite }}"
        echo ""
        
        # Run tests with detailed output
        npx playwright test --project=${{ matrix.browser }} --grep="@${{ inputs.test-suite }}" || {
          echo "❌ Tests failed with exit code $?"
          echo ""
          echo "📋 Last 100 lines of backend log:"
          tail -100 backend.log || echo "No backend log available"
          echo ""
          echo "📋 Last 100 lines of frontend log:"
          tail -100 frontend.log || echo "No frontend log available"
          exit 1
        }
      env:
        BASE_URL: http://localhost:5173
        CI: true

    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ inputs.test-suite }}-${{ matrix.browser }}
        path: playwright-report/
        retention-days: 30

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ inputs.test-suite }}-${{ matrix.browser }}
        path: test-results/
        retention-days: 30

    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results-${{ inputs.test-suite }}-${{ matrix.browser }}
        path: allure-results/
        retention-days: 30

    - name: Upload Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: logs-${{ inputs.test-suite }}-${{ matrix.browser }}
        path: |
          backend.log
          frontend.log
        retention-days: 30

    - name: Show service logs on failure
      if: failure()
      run: |
        echo "📋 Backend logs:"
        cat backend.log || echo "No backend logs"
        echo ""
        echo "📋 Frontend logs:"
        cat frontend.log || echo "No frontend logs"

    - name: Cleanup services
      if: always()
      run: |
        echo "🧹 Terminating web services only (preserving all artifacts)..."
        [ -f backend.pid ] && kill $(cat backend.pid) && echo "✅ Backend terminated" || echo "⚠️ Backend already stopped"
        [ -f frontend.pid ] && kill $(cat frontend.pid) && echo "✅ Frontend terminated" || echo "⚠️ Frontend already stopped"
        echo "✅ Service cleanup complete - All test artifacts preserved"
