name: Run Playwright Tests

on:
  workflow_call:
    inputs:
      test-suite:
        description: 'Test suite to run (order or registration)'
        required: true
        type: string
      browser-matrix:
        description: 'Browser matrix as JSON array'
        required: false
        type: string
        default: '["chromium", "firefox", "webkit"]'

jobs:
  test:
    name: ${{ inputs.test-suite }} Tests - ${{ matrix.browser }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ fromJson(inputs.browser-matrix) }}
        
    steps:
    - name: Checkout test framework repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install test dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}

    - name: Start services and run tests
      run: |
        # Clone demo application
        echo "📦 Cloning demo application..."
        git clone https://github.com/Animesh66/demo-front-end.git demo-app
        
        # Install backend
        echo "📦 Installing backend dependencies..."
        cd demo-app/server
        npm install
        cd ../..
        
        # Install frontend
        echo "📦 Installing frontend dependencies..."
        cd demo-app/client
        npm install
        cd ../..
        
        # Start backend
        echo "🚀 Starting backend server..."
        cd demo-app/server
        PORT=3000 MONGODB_URI=mongodb://localhost:27017/demo-app NODE_ENV=development JWT_SECRET=test-secret nohup npm start > ../../backend.log 2>&1 &
        BACKEND_PID=$!
        echo $BACKEND_PID > ../../backend.pid
        cd ../..
        echo "Backend started with PID: $BACKEND_PID"
        
        # Start frontend
        echo "🚀 Starting frontend server..."
        cd demo-app/client
        VITE_API_URL=http://localhost:3000 nohup npm run dev -- --host 0.0.0.0 --port 5173 > ../../frontend.log 2>&1 &
        FRONTEND_PID=$!
        echo $FRONTEND_PID > ../../frontend.pid
        cd ../..
        echo "Frontend started with PID: $FRONTEND_PID"
        
        # Wait for backend
        echo "⏳ Waiting for backend..."
        for i in {1..60}; do
          if curl -sf http://localhost:3000/api/products > /dev/null 2>&1; then
            echo "✅ Backend ready"
            break
          fi
          if [ $i -eq 60 ]; then
            echo "❌ Backend failed to start"
            cat backend.log
            exit 1
          fi
          sleep 2
        done
        
        # Wait for frontend
        echo "⏳ Waiting for frontend..."
        for i in {1..60}; do
          if curl -sf http://localhost:5173 > /dev/null 2>&1; then
            echo "✅ Frontend ready"
            break
          fi
          if [ $i -eq 60 ]; then
            echo "❌ Frontend failed to start"
            cat frontend.log
            exit 1
          fi
          sleep 2
        done
        
        # Verify processes are still alive
        if ! ps -p $BACKEND_PID > /dev/null; then
          echo "❌ Backend process died"
          cat backend.log
          exit 1
        fi
        
        if ! ps -p $FRONTEND_PID > /dev/null; then
          echo "❌ Frontend process died"
          cat frontend.log
          exit 1
        fi
        
        echo "✅ Both services are running and responding"
        
        # Run tests immediately while services are alive
        echo "🧪 Running ${{ inputs.test-suite }} tests on ${{ matrix.browser }}..."
        npx playwright test --project=${{ matrix.browser }} --grep="@${{ inputs.test-suite }}"
        TEST_EXIT_CODE=$?
        
        # Save logs for artifacts
        echo "📋 Saving service logs..."
        
        # Kill services
        echo "🧹 Stopping services..."
        kill $BACKEND_PID 2>/dev/null || true
        kill $FRONTEND_PID 2>/dev/null || true
        
        # Exit with test result
        exit $TEST_EXIT_CODE
      env:
        BASE_URL: http://localhost:5173
        CI: true

    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ inputs.test-suite }}-${{ matrix.browser }}
        path: playwright-report/
        retention-days: 30

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ inputs.test-suite }}-${{ matrix.browser }}
        path: test-results/
        retention-days: 30

    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results-${{ inputs.test-suite }}-${{ matrix.browser }}
        path: allure-results/
        retention-days: 30

    - name: Upload Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: logs-${{ inputs.test-suite }}-${{ matrix.browser }}
        path: |
          backend.log
          frontend.log
        retention-days: 30

