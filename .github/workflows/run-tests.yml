name: Run Playwright Tests

on:
  workflow_call:
    inputs:
      test-suite:
        description: 'Test suite to run (order or registration)'
        required: true
        type: string
      browser-matrix:
        description: 'Browser matrix as JSON array'
        required: false
        type: string
        default: '["chromium", "firefox", "webkit"]'

jobs:
  test:
    name: ${{ inputs.test-suite }} Tests - ${{ matrix.browser }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ fromJson(inputs.browser-matrix) }}
        
    steps:
    - name: Checkout test framework repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Clone and install demo application
      run: |
        echo "📦 Cloning demo application..."
        git clone https://github.com/Animesh66/demo-front-end.git demo-app
        
        echo "📦 Installing backend dependencies..."
        cd demo-app/server && npm install && cd ../..
        
        echo "📦 Installing frontend dependencies..."
        cd demo-app/client && npm install && cd ../..
        
        echo "✅ Demo application ready"

    - name: Start backend service
      run: |
        cd demo-app/server
        echo "🚀 Starting backend server..."
        PORT=3000 MONGODB_URI=mongodb://localhost:27017/demo-app NODE_ENV=development JWT_SECRET=test-secret setsid npm start </dev/null >../../backend.log 2>&1 &
        BACKEND_PID=$!
        echo $BACKEND_PID > ../../backend.pid
        cd ../..
        echo "Backend started with PID: $BACKEND_PID"
        sleep 3
        
        # Verify process is running
        if ps -p $BACKEND_PID > /dev/null 2>&1; then
          echo "✅ Backend process confirmed running"
        else
          echo "❌ Backend process not found"
          cat backend.log
          exit 1
        fi

    - name: Start frontend service
      run: |
        cd demo-app/client
        echo "🚀 Starting frontend server..."
        VITE_API_URL=http://localhost:3000 setsid npm run dev -- --host 0.0.0.0 --port 5173 </dev/null >../../frontend.log 2>&1 &
        FRONTEND_PID=$!
        echo $FRONTEND_PID > ../../frontend.pid
        cd ../..
        echo "Frontend started with PID: $FRONTEND_PID"
        sleep 3
        
        # Verify process is running
        if ps -p $FRONTEND_PID > /dev/null 2>&1; then
          echo "✅ Frontend process confirmed running"
        else
          echo "❌ Frontend process not found"
          cat frontend.log
          exit 1
        fi

    - name: Wait for services to be ready
      run: |
        echo "⏳ Waiting for backend API..."
        for i in {1..60}; do
          if curl -sf http://localhost:3000/api/products > /dev/null 2>&1; then
            echo "✅ Backend API responding"
            break
          fi
          if [ $i -eq 60 ]; then
            echo "❌ Backend failed to respond"
            cat backend.log
            exit 1
          fi
          sleep 2
        done
        
        echo "⏳ Waiting for frontend..."
        for i in {1..60}; do
          if curl -sf http://localhost:5173 > /dev/null 2>&1; then
            echo "✅ Frontend responding"
            break
          fi
          if [ $i -eq 60 ]; then
            echo "❌ Frontend failed to respond"
            cat frontend.log
            exit 1
          fi
          sleep 2
        done
        
        echo "✅ All services ready"

    - name: Install test dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}

    - name: Verify services before tests
      run: |
        BACKEND_PID=$(cat backend.pid)
        FRONTEND_PID=$(cat frontend.pid)
        
        echo "🔍 Verifying backend PID $BACKEND_PID..."
        if ps -p $BACKEND_PID > /dev/null 2>&1; then
          echo "✅ Backend still running"
        else
          echo "❌ Backend died!"
          tail -100 backend.log
          exit 1
        fi
        
        echo "🔍 Verifying frontend PID $FRONTEND_PID..."
        if ps -p $FRONTEND_PID > /dev/null 2>&1; then
          echo "✅ Frontend still running"
        else
          echo "❌ Frontend died!"
          tail -100 frontend.log
          exit 1
        fi
        
        # Health checks
        curl -f http://localhost:3000/api/products || { echo "Backend not responding"; exit 1; }
        curl -f http://localhost:5173 || { echo "Frontend not responding"; exit 1; }
        
        echo "✅ All services verified and healthy"

    - name: Run ${{ inputs.test-suite }} Tests
      run: npx playwright test --project=${{ matrix.browser }} --grep="@${{ inputs.test-suite }}"
      env:
        BASE_URL: http://localhost:5173
        CI: true

    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ inputs.test-suite }}-${{ matrix.browser }}
        path: playwright-report/
        retention-days: 30

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ inputs.test-suite }}-${{ matrix.browser }}
        path: test-results/
        retention-days: 30

    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results-${{ inputs.test-suite }}-${{ matrix.browser }}
        path: allure-results/
        retention-days: 30

    - name: Upload Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: logs-${{ inputs.test-suite }}-${{ matrix.browser }}
        path: |
          backend.log
          frontend.log
        retention-days: 30

    - name: Cleanup services
      if: always()
      run: |
        echo "🧹 Stopping services..."
        if [ -f backend.pid ]; then
          BACKEND_PID=$(cat backend.pid)
          kill $BACKEND_PID 2>/dev/null && echo "✅ Backend (PID $BACKEND_PID) stopped" || echo "⚠️ Backend already stopped"
        fi
        
        if [ -f frontend.pid ]; then
          FRONTEND_PID=$(cat frontend.pid)
          kill $FRONTEND_PID 2>/dev/null && echo "✅ Frontend (PID $FRONTEND_PID) stopped" || echo "⚠️ Frontend already stopped"
        fi
        
        echo "✅ Cleanup complete"

