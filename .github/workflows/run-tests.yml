name: Run Playwright Tests

on:
  workflow_call:
    inputs:
      test-suite:
        description: 'Test suite to run (order or registration)'
        required: true
        type: string
      browser-matrix:
        description: 'Browser matrix as JSON array'
        required: false
        type: string
        default: '["chromium", "firefox", "webkit"]'

jobs:
  test:
    name: ${{ inputs.test-suite }} Tests - ${{ matrix.browser }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ fromJson(inputs.browser-matrix) }}
        
    steps:
    - name: Checkout test framework repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Clone and start demo application
      run: |
        git clone https://github.com/Animesh66/demo-front-end.git demo-app
        
        # Get absolute paths
        WORK_DIR=$(pwd)
        
        # Install and start backend
        cd demo-app/server
        npm install
        # Start in background with setsid to create new session (survives shell exit)
        setsid npm start > "${WORK_DIR}/backend.log" 2>&1 < /dev/null &
        BACKEND_PID=$!
        echo $BACKEND_PID > "${WORK_DIR}/backend.pid"
        cd "${WORK_DIR}"
        
        # Install and start frontend
        cd demo-app/client
        npm install
        # Start in background with setsid to create new session (survives shell exit)
        setsid npm run dev -- --host 0.0.0.0 --port 5173 > "${WORK_DIR}/frontend.log" 2>&1 < /dev/null &
        FRONTEND_PID=$!
        echo $FRONTEND_PID > "${WORK_DIR}/frontend.pid"
        cd "${WORK_DIR}"
        
        # Verify PID files were created
        echo "Backend PID: $(cat backend.pid)"
        echo "Frontend PID: $(cat frontend.pid)"
        
        # Verify processes are running
        ps -p $(cat backend.pid) && echo "✅ Backend process running" || echo "❌ Backend process not found"
        ps -p $(cat frontend.pid) && echo "✅ Frontend process running" || echo "❌ Frontend process not found"
      env:
        PORT: 3000
        MONGODB_URI: mongodb://localhost:27017/demo-app
        NODE_ENV: development
        JWT_SECRET: test-secret
        VITE_API_URL: http://localhost:3000

    - name: Wait for services
      run: |
        echo "⏳ Waiting for Backend..."
        for i in {1..40}; do
          if curl -sf http://localhost:3000/api/products > /dev/null 2>&1; then
            echo "✅ Backend ready"
            break
          fi
          echo "  Attempt $i/40..."
          sleep 3
        done
        
        echo "⏳ Waiting for Frontend..."
        for i in {1..40}; do
          if curl -sf http://localhost:5173 > /dev/null 2>&1; then
            echo "✅ Frontend ready"
            break
          fi
          echo "  Attempt $i/40..."
          sleep 3
        done
        
        # Verify login page is accessible (important for auth setup)
        echo "⏳ Verifying login page..."
        for i in {1..20}; do
          if curl -sf http://localhost:5173/login > /dev/null 2>&1; then
            echo "✅ Login page accessible"
            break
          fi
          echo "  Attempt $i/20..."
          sleep 2
        done
        
        # Give services extra time to stabilize
        echo "⏳ Allowing services to stabilize..."
        sleep 10
        
        echo "✅ All services ready for testing"

    - name: Install test dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}

    - name: Verify services before test execution
      run: |
        echo "🔍 Verifying services are still running..."
        if ! ps -p $(cat backend.pid) > /dev/null; then
          echo "❌ Backend process died!"
          echo "Last backend logs:"
          tail -50 backend.log
          exit 1
        fi
        if ! ps -p $(cat frontend.pid) > /dev/null; then
          echo "❌ Frontend process died!"
          echo "Last frontend logs:"
          tail -50 frontend.log
          exit 1
        fi
        echo "✅ Both services confirmed running"
        
        # Final health check
        echo "🔍 Final health check..."
        curl -f http://localhost:3000/api/products || { echo "❌ Backend not responding"; exit 1; }
        curl -f http://localhost:5173 || { echo "❌ Frontend not responding"; exit 1; }
        echo "✅ Services responding to requests"

    - name: Run ${{ inputs.test-suite }} Tests
      run: npx playwright test --project=${{ matrix.browser }} --grep="@${{ inputs.test-suite }}"
      env:
        BASE_URL: http://localhost:5173
        CI: true

    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ inputs.test-suite }}-${{ matrix.browser }}
        path: playwright-report/
        retention-days: 30

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ inputs.test-suite }}-${{ matrix.browser }}
        path: test-results/
        retention-days: 30

    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results-${{ inputs.test-suite }}-${{ matrix.browser }}
        path: allure-results/
        retention-days: 30

    - name: Upload Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: logs-${{ inputs.test-suite }}-${{ matrix.browser }}
        path: |
          backend.log
          frontend.log
        retention-days: 30

    - name: Show service logs on failure
      if: failure()
      run: |
        echo "📋 Backend logs:"
        cat backend.log || echo "No backend logs"
        echo ""
        echo "📋 Frontend logs:"
        cat frontend.log || echo "No frontend logs"

    - name: Cleanup services
      if: always()
      run: |
        echo "🧹 Terminating web services only (preserving all artifacts)..."
        [ -f backend.pid ] && kill $(cat backend.pid) && echo "✅ Backend terminated" || echo "⚠️ Backend already stopped"
        [ -f frontend.pid ] && kill $(cat frontend.pid) && echo "✅ Frontend terminated" || echo "⚠️ Frontend already stopped"
        echo "✅ Service cleanup complete - All test artifacts preserved"
